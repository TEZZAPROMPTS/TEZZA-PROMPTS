<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tezza Prompts Oficial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@300..700&family=Comfortaa:wght@300..700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-dark: #000000;
      --card-bg: rgba(20, 20, 20, 0.95);
      --text-white: #ffffff;
      --text-gray: #a0a0a0;
      --border-gray: #333333;
      --accent-white: #f5f5f5;
      --glow-color: rgba(255, 255, 255, 0.4);
      --glow-active: rgba(255, 255, 255, 0.9);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Quicksand', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      background-attachment: fixed;
      color: var(--text-white);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2px solid var(--border-gray);
      border-radius: 45px;
      padding: 50px 35px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      position: relative;
      text-align: center;
      transition: all 0.4s ease;
    }

    .card:hover {
      border-color: var(--text-gray);
      box-shadow: 0 0 20px var(--glow-color), 0 25px 50px rgba(0, 0, 0, 0.5);
    }

    .header {
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .title-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      width: 100%;
    }

    .bow-gif {
      width: 60px;
      height: 60px;
      object-fit: contain;
      filter: grayscale(100%) brightness(1.5);
    }

    .bow-gif.right {
      transform: scaleX(-1);
    }

    .header h1 {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(2.5rem, 8vw, 3.5rem);
      color: var(--text-white);
      font-weight: 600;
      letter-spacing: -1px;
      line-height: 1;
    }

    .subtitle {
      font-family: 'Fredoka', sans-serif;
      font-size: 0.9rem;
      color: var(--text-gray);
      letter-spacing: 1.5px;
      font-weight: 500;
      text-transform: uppercase;
    }

    .divider {
      width: 50%;
      height: 2px;
      background: var(--border-gray);
      border-radius: 10px;
      margin: 25px auto;
      transition: all 0.4s ease;
    }

    .card:hover .divider {
      background: var(--text-gray);
      box-shadow: 0 0 10px var(--glow-color);
    }

    .prompt-section {
      margin-top: 20px;
    }

    pre {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid var(--border-gray);
      padding: 25px;
      border-radius: 30px;
      font-family: 'Comfortaa', cursive;
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.6;
      color: var(--accent-white);
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-bottom: 30px;
      text-align: left;
      transition: all 0.4s ease;
    }

    pre:hover {
      border-color: var(--text-gray);
      box-shadow: 0 0 15px var(--glow-color);
    }

    button {
      width: 100%;
      padding: 18px;
      background: var(--text-white);
      color: var(--bg-dark);
      border: 3px solid transparent;
      border-radius: 50px;
      font-family: 'Fredoka', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
    }

    button:hover {
      transform: translateY(-5px) scale(1.02);
      background: var(--accent-white);
      box-shadow: 0 15px 25px rgba(255, 255, 255, 0.2), 0 0 15px var(--glow-color);
    }

    button:active {
      transform: scale(0.95);
    }

    @keyframes button-glow-pulse {
      0% { border-color: transparent; box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1); }
      50% { border-color: var(--text-white); box-shadow: 0 0 25px var(--glow-active); }
      100% { border-color: transparent; box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1); }
    }

    button.copy-success {
      animation: button-glow-pulse 0.8s ease-in-out infinite;
      background: var(--text-white) !important;
      color: var(--bg-dark) !important;
    }

    .info-section {
      margin-top: 35px;
    }

    .info-mark {
      font-family: 'Fredoka', sans-serif;
      color: var(--text-white);
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .info-footer {
      font-family: 'Quicksand', sans-serif;
      color: var(--text-gray);
      font-size: 0.8rem;
      font-weight: 500;
    }

    footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border-gray);
      font-family: 'Fredoka', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-gray);
      letter-spacing: 1px;
    }

    @media (max-width: 640px) {
      .card { padding: 40px 25px; margin: 0 10px; border-radius: 35px; }
      .bow-gif { width: 45px; height: 45px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="mainCard">
      <div class="content">
        <div class="header">
          <div class="title-wrapper">
            <img class="bow-gif left" src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExdGJieHI0aXdjcHJsaGptZWp1OXlpeHA2Z2ZtbzdoZ2poOGE5MXgzcSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/nxQA5nWEKzB5uz3Yr8/giphy.gif" alt="bow" />
            <h1>Tezza</h1>
            <img class="bow-gif right" src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExdGJieHI0aXdjcHJsaGptZWp1OXlpeHA2Z2ZtbzdoZ2poOGE5MXgzcSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/nxQA5nWEKzB5uz3Yr8/giphy.gif" alt="bow" />
          </div>
          <p class="subtitle">TEZZA PROMPTS OFICIAL</p>
        </div>

        <div class="divider"></div>

        <div class="prompt-section">
          <pre id="promptText">
            
GEMINI   [MODO PRO]

            
[COLOQUE O SEU PROMPT AQUI]
          
</pre>

          <button onclick="copyPrompt()" id="copyBtn">
            <span id="btnText">Copiar Prompt</span>
          </button>

          <div class="info-section">
            <p class="info-mark">MARQUE @tezza.vu</p>
            <p class="info-footer">TEZZA PROMPTS OFICIAL — Conteúdo protegido.</p>
          </div>
        </div>
      </div>

      <footer>
        TEZZA PROMPTS OFICIAL
      </footer>
    </div>
  </div>

  <script>
    function copyPrompt() {
      const promptText = document.getElementById('promptText').innerText;
      const copyBtn = document.getElementById('copyBtn');
      const btnText = document.getElementById('btnText');

      function triggerSuccess() {
        const originalText = btnText.innerText;
        btnText.innerText = 'Prompt copiado com sucesso!';
        copyBtn.classList.add('copy-success');
        setTimeout(() => {
          btnText.innerText = originalText;
          copyBtn.classList.remove('copy-success');
        }, 3000);
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(promptText).then(triggerSuccess).catch(() => fallbackCopy(promptText));
      } else {
        fallbackCopy(promptText);
      }

      function fallbackCopy(text) {
        try {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          textArea.style.position = "fixed";
          textArea.style.left = "-9999px";
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          const successful = document.execCommand('copy');
          document.body.removeChild(textArea);
          if (successful) triggerSuccess();
        } catch (err) { console.error('Erro ao copiar:', err); }
      }
    }
  </script>
</body>
</html>
